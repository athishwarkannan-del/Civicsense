services:
  # Backend Service
  - type: web
    name: civicsense-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: MONGO_URL
        sync: false # Set in Render UI
      - key: DB_NAME
        value: civic_sense
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256

  # Frontend Service
  - type: web
    name: civicsense-frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false # Set to backend URL in Render UI
